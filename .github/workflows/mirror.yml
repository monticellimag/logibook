name: 🪞 Mirror to monticellimag

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror repo to monticellimag/Logibook
    runs-on: ubuntu-latest
    # Gira SOLO sul repo sorgente, non sul mirror (evita loop)
    if: github.repository == 'alebaia81/Logibook'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to monticellimag
        run: |
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/monticellimag/logibook.git
          git push mirror main --force
